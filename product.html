    <script type="module" src="app.js"></script>

   <script>
    let currentPageQty = 1;
    let isCustomProduct = false;

    window.updatePageQty = (change) => {
        currentPageQty += change;
        if(currentPageQty < 1) currentPageQty = 1;
        if(currentPageQty > 50) currentPageQty = 50; // Higher limit for medals
        
        document.getElementById('p-qty-val').innerText = currentPageQty;
        
        // Dynamic Re-render of inputs if custom product
        if(isCustomProduct) renderCustomInputs(currentPageQty);
    };

    function renderCustomInputs(qty) {
        const container = document.getElementById('custom-inputs-container');
        // Save existing values to not lose text when qty changes
        const currentValues = Array.from(document.querySelectorAll('.c-input')).map(i => i.value);
        
        container.innerHTML = '';
        
        for(let i = 0; i < qty; i++) {
            const val = currentValues[i] || '';
            container.innerHTML += `
                <div class="custom-input-row">
                    <span class="c-idx">#${i+1}</span>
                    <input type="text" class="c-input" placeholder="Enter Name / Text" value="${val}">
                </div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));

        if (typeof products === 'undefined') { console.error("Data not loaded"); return; }
        const p = products.find(x => x.id === id);

        if(!p) return;

        // Populate Data
        const carousel = document.getElementById('p-carousel');
        const indicators = document.getElementById('p-carousel-indicators');

        if (p.images && p.images.length > 0) {
            // Render Slides
            carousel.innerHTML = p.images.map(img => `<div class="carousel-slide"><img src="${img}" alt="${p.title}"></div>`).join('');
            
            // Render Indicators
            indicators.innerHTML = p.images.map((_, index) => `<div class="indicator-dot ${index === 0 ? 'active' : ''}" data-index="${index}"></div>`).join('');

            // Indicator Click Navigation
            const dots = document.querySelectorAll('.indicator-dot');
            dots.forEach(dot => {
                dot.onclick = () => {
                    const idx = parseInt(dot.dataset.index);
                    carousel.scrollTo({ left: idx * carousel.clientWidth, behavior: 'smooth' });
                };
            });

            // Scroll Sync Logic
            carousel.onscroll = () => {
                const idx = Math.round(carousel.scrollLeft / carousel.clientWidth);
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === idx);
                });
            };
        } else {
            carousel.innerHTML = `<div class="carousel-slide"><img src="${p.image}" alt="${p.title}"></div>`;
            indicators.style.display = 'none';
        }

        // Auto-Swipe Logic
        let carouselTimer;
        const startCarousel = () => {
            if (!p.images || p.images.length <= 1) return;
            carouselTimer = setInterval(() => {
                if (carousel.scrollLeft + carousel.clientWidth >= carousel.scrollWidth - 10) {
                    carousel.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    carousel.scrollBy({ left: carousel.clientWidth, behavior: 'smooth' });
                }
            }, 3000);
        };
        const stopCarousel = () => clearInterval(carouselTimer);

        startCarousel();

        carousel.addEventListener('mouseenter', stopCarousel);
        carousel.addEventListener('mouseleave', startCarousel);
        carousel.addEventListener('touchstart', stopCarousel, { passive: true });
        carousel.addEventListener('touchend', startCarousel, { passive: true });



        document.getElementById('p-title').innerText = p.title;
        document.getElementById('p-cat').innerText = p.category;
        document.getElementById('p-price').innerText = `₹${p.price}`;
        document.getElementById('p-desc').innerText = p.description;

        if(p.originalPrice && p.originalPrice > p.price) {
            document.getElementById('p-original').innerText = `₹${p.originalPrice}`;
            document.getElementById('p-original').style.display = 'inline';
        }

        // --- CUSTOMIZATION LOGIC ---
        if(p.isCustomizable) {
            isCustomProduct = true;
            document.getElementById('custom-section').style.display = 'block';
            renderCustomInputs(1);
            
            // Change Button Text
            const btn = document.getElementById('btn-detail-add');
            btn.innerHTML = `Save & Add To Cart`;
            btn.style.background = "var(--brand-b2b)";
        }
        
        // Add to Cart Logic
        document.getElementById('btn-detail-add').onclick = () => {
            if(window.addToCart) {
                if(isCustomProduct) {
                    // Gather Inputs
                    const inputs = document.querySelectorAll('.c-input');
                    const names = Array.from(inputs).map(i => i.value.trim());
                    
                    // Validation: Check if any empty
                    if(names.some(n => n === '')) {
                        alert("Please enter details for all " + currentPageQty + " items.");
                        return;
                    }
                    
                    window.addToCart(p.id, currentPageQty, { names: names });
                } else {
                    window.addToCart(p.id, currentPageQty);
                }
            }
        };
    });
</script>
